<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>GoldBerry Marker Scanner · Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #050509;
      --card: #101018;
      --accent: #f5f08a;
      --text: #f9fafb;
      --muted: #9ca3af;
      --danger: #f97373;
      --radius-lg: 18px;
      --radius-full: 999px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
        "Inter", sans-serif;
      background: radial-gradient(circle at top, #111827 0, #020617 55%, #020617 100%);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .shell {
      width: 100%;
      max-width: 420px;
      background:
        radial-gradient(circle at top left,
          rgba(245,240,138,0.12),
          transparent 55%),
        radial-gradient(circle at bottom right,
          rgba(59,130,246,0.14),
          transparent 55%),
        #020617;
      border-radius: 28px;
      padding: 22px 18px 18px;
      border: 1px solid rgba(148,163,184,0.25);
      box-shadow:
        0 24px 80px rgba(15,23,42,0.9),
        0 0 0 1px rgba(15,23,42,0.9);
      position: relative;
      overflow: hidden;
    }
    header {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
      z-index: 1;
    }
    .brand { display: flex; align-items: center; gap: 10px; }
    .badge {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 1px solid rgba(248, 250, 252, 0.18);
      background:
        radial-gradient(circle at 30% 0%, rgba(245,240,138,0.65), transparent 55%),
        radial-gradient(circle at 70% 100%, rgba(59,130,246,0.65), transparent 55%),
        #020617;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 0 1px rgba(15,23,42,0.9);
    }
    .badge-inner {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      box-shadow: 0 0 12px rgba(245,240,138,0.65);
    }
    .brand-text { display: flex; flex-direction: column; gap: 2px; }
    .brand-title {
      font-size: 14px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .brand-sub { font-size: 12px; color: var(--muted); }
    .status-pill {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.85);
      border: 1px solid rgba(148, 163, 184, 0.6);
      color: var(--muted);
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 8px rgba(34,197,94,0.7);
    }
    main { position: relative; z-index: 1; }
    .card {
      border-radius: var(--radius-lg);
      border: 1px solid rgba(148, 163, 184, 0.4);
      background: linear-gradient(145deg, rgba(15,23,42,0.96), rgba(15,23,42,0.86));
      padding: 18px 14px 14px;
      box-shadow:
        0 18px 40px rgba(15,23,42,0.85),
        0 0 0 1px rgba(15,23,42,0.85);
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .headline { display: flex; flex-direction: column; gap: 4px; }
    .headline h1 {
      font-size: 18px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .headline p { font-size: 13px; color: var(--muted); max-width: 30rem; }
    .scanner-frame {
      position: relative;
      border-radius: 16px;
      background: radial-gradient(circle at top, rgba(15,23,42,1), #020617 80%);
      border: 1px solid rgba(148,163,184,0.45);
      overflow: hidden;
      min-height: 260px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }
    .overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .overlay-ring {
      width: 72%;
      max-width: 260px;
      aspect-ratio: 1/1;
      border-radius: 50%;
      border: 1.5px solid rgba(148,163,184,0.9);
      box-shadow:
        0 0 0 1px rgba(15,23,42, 0.95),
        0 0 30px rgba(245,240,138,0.35);
      position: relative;
    }
    .overlay-ring::before {
      content: "";
      position: absolute;
      inset: 14%;
      border-radius: 50%;
      border: 1px dashed rgba(148,163,184,0.6);
    }
    .controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    .btn {
      flex: 1 1 auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px 14px;
      border-radius: var(--radius-full);
      font-size: 13px;
      font-weight: 500;
      border: 1px solid transparent;
      cursor: pointer;
      background: radial-gradient(circle at 25% 0,
                 rgba(245,240,138,0.85),
                 rgba(245,240,138,0.35) 35%,
                 rgba(15,23,42,1) 80%);
      color: #020617;
      box-shadow:
        0 0 0 1px rgba(15,23,42,0.9),
        0 14px 35px rgba(245,240,138,0.45);
      transition:
        transform 160ms cubic-bezier(0.16,1,0.3,1),
        box-shadow 160ms cubic-bezier(0.16,1,0.3,1),
        background 160ms cubic-bezier(0.16,1,0.3,1);
    }
    .btn:active {
      transform: translateY(1px) scale(0.99);
      box-shadow:
        0 0 0 1px rgba(15,23,42,0.9),
        0 6px 20px rgba(245,240,138,0.35);
    }
    .btn-secondary {
      flex: 0 0 auto;
      min-width: 86px;
      padding-inline: 12px;
      background: rgba(15,23,42,0.9);
      color: var(--muted);
      border-color: rgba(148,163,184,0.6);
      box-shadow: none;
    }
    .btn-secondary:active {
      transform: translateY(1px);
      box-shadow: 0 0 0 1px rgba(15,23,42,0.9);
    }
    .result { margin-top: 12px; font-size: 12px; color: var(--muted); }
    .result strong { color: var(--accent); font-weight: 500; }
    .error { color: var(--danger); margin-top: 6px; font-size: 11px; min-height: 14px; }
    footer {
      margin-top: 14px;
      font-size: 10px;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }
    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <div class="brand">
        <div class="badge">
          <div class="badge-inner"></div>
        </div>
        <div class="brand-text">
          <div class="brand-title">GoldBerry</div>
          <div class="brand-sub">Marker Scanner · Demo</div>
        </div>
      </div>
      <div class="status-pill">
        <span class="status-dot"></span>
        Camera ready
      </div>
    </header>

    <main>
      <section class="card" aria-label="GoldBerry scanner">
        <div class="headline">
          <h1>Scan the Marker</h1>
          <p>Point your camera at the round cap code. When the ring is recognised, the GoldBerry product page will open in a new tab.</p>
        </div>

        <div class="scanner-frame">
          <video id="video" playsinline muted></video>
          anvas id="canvas" style="display:none;"></canvas>
          <div class="overlay">
            <div class="overlay-ring"></div>
          </div>
        </div>

        <div class="controls">
          <button class="btn" id="start-btn" type="button">
            <span>Start scanner</span>
          </button>
          <button class="btn btn-secondary" id="stop-btn" type="button">
            Stop
          </button>
        </div>

        <div class="result" id="result">
          <strong>Status:</strong> idle
        </div>
        <div class="error" id="error" role="status" aria-live="polite"></div>
      </section>

      <footer>
        <span>Demo: image‑based marker recognition.</span>
        <a href="https://goldberry.vercel.app/" target="_blank" rel="noopener noreferrer">GoldBerry product</a>
      </footer>
    </main>
  </div>

  <script>
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const startBtn = document.getElementById("start-btn");
    const stopBtn = document.getElementById("stop-btn");
    const resultEl = document.getElementById("result");
    const errorEl = document.getElementById("error");
    const TARGET_URL = "https://goldberry.vercel.app/";

    let stream = null;
    let scanning = false;
    let redirecting = false;
    let scanTimer = null;

    function setStatus(text) {
      resultEl.innerHTML = "<strong>Status:</strong> " + text;
    }
    function setError(text) {
      errorEl.textContent = text || "";
    }

    async function start() {
      setError("");
      redirecting = false;
      if (scanning) return;
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "environment" },
          audio: false
        });
        video.srcObject = stream;
        await video.play();
        scanning = true;
        setStatus("scanning…");
        scheduleScan();
      } catch (err) {
        console.error(err);
        setError("Camera error. Allow camera access and use HTTPS.");
        setStatus("failed to start");
      }
    }

    async function stop() {
      scanning = false;
      if (scanTimer) clearTimeout(scanTimer);
      if (video) video.pause();
      if (stream) {
        stream.getTracks().forEach(t => t.stop());
        stream = null;
      }
      setStatus("stopped");
    }

    function scheduleScan() {
      if (!scanning) return;
      scanTimer = setTimeout(() => {
        tryDetectMarker();
        scheduleScan();
      }, 400); // каждые 0.4 c
    }

    function tryDetectMarker() {
      if (!video.videoWidth || !video.videoHeight) return;

      const size = Math.min(video.videoWidth, video.videoHeight);
      const sx = (video.videoWidth - size) / 2;
      const sy = (video.videoHeight - size) / 2;

      canvas.width = 128;
      canvas.height = 128;

      // берём центральный квадрат
      ctx.drawImage(video, sx, sy, size, size, 0, 0, canvas.width, canvas.height);

      const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const data = img.data;

      // переводим в градации серого
      const gray = new Float32Array(canvas.width * canvas.height);
      for (let i = 0; i < data.length; i += 4) {
        const r = data[i], g = data[i+1], b = data[i+2];
        gray[i/4] = 0.299*r + 0.587*g + 0.114*b;
      }

      // оцениваем, есть ли яркое контрастное кольцо по окружности:
      // считаем среднюю яркость в трёх зонах: центр, кольцо, внешняя часть
      const cx = canvas.width / 2;
      const cy = canvas.height / 2;
      const rOuter = canvas.width * 0.48;
      const rInner = canvas.width * 0.28;
      const rCenter = canvas.width * 0.16;

      let sumCenter = 0, nCenter = 0;
      let sumRing = 0, nRing = 0;
      let sumOuter = 0, nOuter = 0;

      for (let y = 0; y < canvas.height; y++) {
        for (let x = 0; x < canvas.width; x++) {
          const dx = x - cx;
          const dy = y - cy;
          const d2 = dx*dx + dy*dy;
          const val = gray[y*canvas.width + x];

          if (d2 < rCenter*rCenter) {
            sumCenter += val; nCenter++;
          } else if (d2 < rInner*rInner) {
            // между центром и внутренним радиусом — пропускаем
          } else if (d2 < rOuter*rOuter) {
            sumRing += val; nRing++;
          } else {
            sumOuter += val; nOuter++;
          }
        }
      }

      if (!nCenter || !nRing || !nOuter) return;

      const meanCenter = sumCenter / nCenter;
      const meanRing = sumRing / nRing;
      const meanOuter = sumOuter / nOuter;

      // эвристика: на маркере должен быть заметный контраст между кольцом и соседними зонами
      const contrastRingCenter = Math.abs(meanRing - meanCenter);
      const contrastRingOuter = Math.abs(meanRing - meanOuter);

      // пороги подобраны эмпирически для демо
      const detected =
        contrastRingCenter > 25 &&
        contrastRingOuter > 25 &&
        contrastRingCenter + contrastRingOuter > 70;

      if (detected && !redirecting) {
        redirecting = true;
        setStatus("marker detected");
        setTimeout(() => {
          window.open(TARGET_URL, "_blank", "noopener");
        }, 300);
      }
    }

    startBtn.addEventListener("click", start);
    stopBtn.addEventListener("click", stop);
    window.addEventListener("pagehide", stop);
  </script>
</body>
</html>
