  </style>
</head>
<body>
<div id="wrap">
  <video id="video" playsinline autoplay muted></video>
  <canvas id="ov"></canvas>

  <!-- status -->

  <div id="pill"><span class="dot"></span><span id="pillTxt">Initializing…</span></div>

  <!-- start -->

<button id="startBtn" disabled>Start Camera</button>

  <!-- success -->

  <div id="success">
    <svg viewBox="0 0 72 72" fill="none">
      <circle cx="36" cy="36" r="34" stroke="#7fd39b" stroke-width="3"/>
      <path d="M22 36l10 10 18-18" stroke="#7fd39b" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <p>Marker detected</p>
  </div>
</div>

<script>
(() => {
  const TARGET_URL  = 'https://goldberry.vercel.app/';
  const INTERVAL_MS = 350;
  const HASH_SIZE   = 32;   // bigger hash = more detail
  const THRESHOLD   = 0.68; // lower = easier to match under camera distortion

  const REF_PATHS = [
    'assets/ref1.jpeg',
    'assets/ref1.jpeg.jpg',
    'assets/ref2.jpeg.jpg',
    'assets/ref3.jpeg.jpg',
    'assets/ref4.jpeg.jpg',
  ];

  const video    = document.getElementById('video');
  const ov       = document.getElementById('ov');
  const octx     = ov.getContext('2d', { willReadFrequently: true });
  const pill     = document.getElementById('pill');
  const pillTxt  = document.getElementById('pillTxt');
  const startBtn = document.getElementById('startBtn');
  const success  = document.getElementById('success');

  let refHashes = [];
  let scanning  = false;
  let locked    = false;
  let stream    = null;
  let timer     = null;

  /* ── pHash ──────────────────────────────────────────── */

  // Resize image to NxN grayscale, compute DCT, return bit array
  function pHash(source, size) {
    const N = size;
    const c = document.createElement('canvas');
    c.width = c.height = N;
    const x = c.getContext('2d', { willReadFrequently: true });
    x.drawImage(source, 0, 0, N, N);
    const d = x.getImageData(0, 0, N, N).data;

    // to grayscale float
    const g = new Float32Array(N * N);
    for (let i = 0; i < N * N; i++) {
      const o = i * 4;
      g[i] = 0.299*d[o] + 0.587*d[o+1] + 0.114*d[o+2];
    }

    // 2-D DCT via separable 1-D
    function dct1(a) {
      const n = a.length, r = new Float32Array(n);
      for (let k = 0; k < n; k++) {
        let s = 0;
        for (let j = 0; j < n; j++) s += a[j] * Math.cos(Math.PI*k*(2*j+1)/(2*n));
        r[k] = s;
      }
      return r;
    }
    const tmp = new Float32Array(N*N);
    for (let r = 0; r < N; r++) {
      const row = g.slice(r*N, r*N+N);
      const d1  = dct1(row);
      for (let c2 = 0; c2 < N; c2++) tmp[r*N+c2] = d1[c2];
    }
    const dct = new Float32Array(N*N);
    for (let c2 = 0; c2 < N; c2++) {
      const col = new Float32Array(N);
      for (let r = 0; r < N; r++) col[r] = tmp[r*N+c2];
      const d1 = dct1(col);
      for (let r = 0; r < N; r++) dct[r*N+c2] = d1[r];
    }

    // top-left 8x8 (skip DC)
    const sub = [];
    for (let r = 0; r < 8; r++)
      for (let c2 = 0; c2 < 8; c2++)
        if (r||c2) sub.push(dct[r*N+c2]);

    const mean = sub.reduce((a,b)=>a+b,0)/sub.length;
    return sub.map(v => v > mean ? 1 : 0);
  }

  function similarity(a, b) {
    let s = 0;
    for (let i = 0; i < a.length; i++) if (a[i]===b[i]) s++;
    return s / a.length;
  }

  // Compare at 3 crop sizes to handle zoom differences
  function bestSimilarity(frameCanvas, refEntry) {
    const w = frameCanvas.width, h = frameCanvas.height;
    const crops = [1.0, 0.8, 0.65];
    let best = 0;
    for (const scale of crops) {
      const cw = Math.round(w * scale), ch = Math.round(h * scale);
      const cx = Math.round((w - cw) / 2),  cy = Math.round((h - ch) / 2);
      const tmp = document.createElement('canvas');
      tmp.width = cw; tmp.height = ch;
      tmp.getContext('2d',{willReadFrequently:true}).drawImage(frameCanvas, cx, cy, cw, ch, 0, 0, cw, ch);
      const h1 = pHash(tmp, HASH_SIZE);
      const s  = similarity(h1, refEntry.hash);
      if (s > best) best = s;
    }
    return best;
  }

  /* ── Refs ───────────────────────────────────────────── */

  function loadImg(src) {
    return new Promise((res, rej) => {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload  = () => res(img);
      img.onerror = () => rej(src);
      img.src = src + '?v=' + Date.now();
    });
  }

  async function loadRefs() {
    let ok = 0;
    for (const path of REF_PATHS) {
      try {
        const img  = await loadImg(path);
        const hash = pHash(img, HASH_SIZE);
        refHashes.push({ path, hash });
        ok++;
      } catch(e) { console.warn('Skip:', e); }
    }
    if (ok === 0) {
      setStatus('Failed to load references', false);
      return;
    }
    setStatus('Ready', true);
    startBtn.disabled = false;
  }

  /* ── UI ─────────────────────────────────────────────── */

  function setStatus(txt, ok = false) {
    pillTxt.textContent = txt;
    pill.classList.toggle('ok', ok);
  }

  function drawRing(sim) {
    const w = ov.width, h = ov.height;
    if (!w||!h) return;
    octx.clearRect(0,0,w,h);
    const r   = Math.min(w,h)*0.36;
    const cx  = w/2, cy = h/2;
    const frac = Math.min(1, sim/THRESHOLD);
    const found = sim >= THRESHOLD;

    // track ring
    octx.beginPath();
    octx.arc(cx, cy, r, -Math.PI/2, Math.PI*1.5);
    octx.strokeStyle = 'rgba(255,255,255,.12)';
    octx.lineWidth = 4;
    octx.stroke();

    // progress
    octx.beginPath();
    octx.arc(cx, cy, r, -Math.PI/2, -Math.PI/2 + Math.PI*2*frac);
    octx.strokeStyle = found ? '#7fd39b' : '#d6ff39';
    octx.lineWidth = 4;
    octx.stroke();

    // guide circle (dashed)
    octx.save();
    octx.setLineDash([6,10]);
    octx.beginPath();
    octx.arc(cx, cy, r*0.72, 0, Math.PI*2);
    octx.strokeStyle = 'rgba(255,255,255,.35)';
    octx.lineWidth = 1.5;
    octx.stroke();
    octx.restore();
  }

  /* ── Camera ─────────────────────────────────────────── */

  async function startCamera() {
    if (scanning||locked) return;
    try {
      setStatus('Starting camera…');
      stream = await navigator.mediaDevices.getUserMedia({
        video:{ facingMode:{ ideal:'environment' }, width:{ideal:1280}, height:{ideal:720} },
        audio:false
      });
      video.srcObject = stream;
      await video.play();
      ov.width  = video.videoWidth  || 1280;
      ov.height = video.videoHeight || 720;
      scanning = true;
      startBtn.style.display = 'none';
      setStatus('Hold marker in view');
      timer = setInterval(processFrame, INTERVAL_MS);
    } catch(e) {
      setStatus('Camera unavailable');
    }
  }

  function stopCamera() {
    clearInterval(timer);
    stream?.getTracks().forEach(t=>t.stop());
    scanning = false;
  }

  /* ── Frame ──────────────────────────────────────────── */

  function processFrame() {
    if (!scanning||locked||!video.videoWidth) return;

    const c = document.createElement('canvas');
    c.width = video.videoWidth; c.height = video.videoHeight;
    c.getContext('2d',{willReadFrequently:true}).drawImage(video,0,0);

    let best = 0;
    for (const ref of refHashes) {
      const s = bestSimilarity(c, ref);
      if (s > best) best = s;
    }

    drawRing(best);

    if (best >= THRESHOLD) {
      locked = true;
      stopCamera();
      success.classList.add('show');
      setTimeout(()=>{ window.location.href = TARGET_URL; }, 1000);
    } else {
      setStatus('Scanning…' + (best > 0.5 ? ' (' + Math.round(best*100) + '%)' : ''));
    }
  }

  /* ── Init ───────────────────────────────────────────── */

  startBtn.addEventListener('click', startCamera);
  setStatus('Loading…');
  loadRefs();
})();
</script>

</body>
</html>
