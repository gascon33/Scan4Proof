<!doctype html>

<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title>Scan4Proof</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{
      min-height:100dvh;
      background:radial-gradient(circle at top,rgba(214,255,57,.14),transparent 26%) #0f1012;
      color:#f5f6fa;
      font:16px/1.5 system-ui,sans-serif;
      -webkit-font-smoothing:antialiased;
    }
    .app{max-width:480px;margin:0 auto;padding:16px;display:grid;gap:14px;}
    /* header */
    .top{display:flex;align-items:center;gap:12px;}
    .logo{
      width:44px;height:44px;border-radius:50%;
      border:1px solid rgba(255,255,255,.12);
      display:grid;place-items:center;flex-shrink:0;
      background:radial-gradient(circle at 30% 0,rgba(214,255,57,.3),transparent 55%);
    }
    h1{font-size:15px;letter-spacing:.08em;text-transform:uppercase;}
    .sub{font-size:12px;color:#8b8f9c;}
    /* screen */
    .screen{
      background:#17181c;border:1px solid rgba(255,255,255,.12);
      border-radius:32px;overflow:hidden;box-shadow:0 18px 52px rgba(0,0,0,.55);
    }
    .cam{position:relative;aspect-ratio:9/16;min-height:72dvh;background:#000;}
    video,canvas{position:absolute;inset:0;width:100%;height:100%;}
    video{object-fit:cover;}
    canvas{pointer-events:none;}
    /* HUD */
    .hud{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:space-between;padding:18px;}
    .pill{
      display:inline-flex;align-items:center;gap:10px;width:max-content;max-width:100%;
      padding:10px 14px;border-radius:999px;
      background:rgba(9,10,14,.78);border:1px solid rgba(255,255,255,.16);
      backdrop-filter:blur(12px);font-size:14px;
    }
    .dot{width:10px;height:10px;border-radius:50%;background:#d6ff39;box-shadow:0 0 0 8px rgba(214,255,57,.16);}
    .pill.ok .dot{background:#7fd39b;box-shadow:0 0 0 8px rgba(127,211,155,.18);}
    .guide{
      align-self:center;margin:auto;
      width:min(74vw,340px);aspect-ratio:1;border-radius:50%;
      border:2px solid rgba(255,255,255,.82);
      box-shadow:0 0 0 999px rgba(0,0,0,.18);
      position:relative;
    }
    .guide::before,.guide::after{
      content:"";position:absolute;border-radius:50%;
      border:2px solid rgba(214,255,57,.78);
    }
    .guide::before{inset:20px;}
    .guide::after{inset:40px;border-color:rgba(255,255,255,.32);}
    /* bottom */
    .bottom{display:grid;gap:10px;}
    .toast{
      display:none;align-items:center;justify-content:space-between;gap:12px;
      padding:14px 16px;border-radius:18px;
      background:rgba(9,10,14,.86);border:1px solid rgba(255,255,255,.18);
      backdrop-filter:blur(14px);
    }
    .toast.show{display:flex;}
    .toast strong{display:block;font-size:14px;}
    .toast small{display:block;font-size:12px;color:rgba(255,255,255,.7);}
    .badge{
      padding:7px 10px;border-radius:999px;
      background:rgba(127,211,155,.16);color:#7fd39b;
      font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;
    }
    .controls{display:flex;gap:10px;}
    .btn{
      flex:1;min-height:52px;padding:14px 16px;border-radius:999px;
      border:1px solid transparent;font:inherit;font-weight:800;cursor:pointer;
    }
    .primary{background:#d6ff39;color:#101010;}
    .secondary{background:rgba(9,10,14,.8);color:#fff;border-color:rgba(255,255,255,.18);}
    .btn:disabled{opacity:.4;cursor:default;}
    /* panel */
    .panel{
      background:#17181c;border:1px solid rgba(255,255,255,.12);
      border-radius:24px;padding:16px;display:grid;gap:10px;
    }
    .panel p{font-size:13px;color:#8b8f9c;}
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
    .cell{
      padding:12px;border-radius:16px;
      background:#1f2127;border:1px solid rgba(255,255,255,.12);
    }
    .cell span{display:block;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:#8b8f9c;margin-bottom:6px;}
    .cell strong{font-size:18px;}
  </style>
</head>
<body>
<div class="app">
  <header class="top">
    <div class="logo" aria-hidden="true">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.7">
        <circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="4"/>
        <path d="M12 2v3M22 12h-3M12 22v-3M2 12h3"/>
      </svg>
    </div>
    <div>
      <h1>Scan4Proof</h1>
      <p class="sub">Наведи камеру на маркер</p>
    </div>
  </header>

  <main class="screen">
    <div class="cam">
      <video id="video" playsinline autoplay muted></video>
      <canvas id="overlay"></canvas>
      <div class="hud">
        <div id="pill" class="pill">
          <span class="dot"></span>
          <span id="pillTxt">Инициализация…</span>
        </div>
        <div class="guide" aria-hidden="true"></div>
        <div class="bottom">
          <div id="toast" class="toast" role="status" aria-live="polite">
            <div>
              <strong>Маркер найден!</strong>
              <small>Переход на сайт…</small>
            </div>
            <div class="badge">OK</div>
          </div>
          <div class="controls">
            <button id="startBtn" class="btn primary" disabled>Старт камеры</button>
            <button id="testBtn" class="btn secondary">Тест</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <section class="panel">
    <p>Сравнение по pHash (перцептивный хэш). Нет тяжёлых библиотек — работает на любом телефоне.</p>
    <div class="stats">
      <div class="cell"><span>Схожесть</span><strong id="simVal">—</strong></div>
      <div class="cell"><span>Статус</span><strong id="stateVal">Ожидание</strong></div>
      <div class="cell"><span>Порог</span><strong id="thrVal">—</strong></div>
    </div>
  </section>
</div>

<script>
(() => {
  const TARGET_URL   = 'https://goldberry.vercel.app/';
  const HASH_SIZE    = 16;          // 16×16 pHash → 256 бит
  const THRESHOLD    = 0.75;        // схожесть 0..1, выше = лучше
  const INTERVAL_MS  = 400;         // пауза между кадрами

  /* Пути к референсным изображениям */
  const REF_PATHS = [
    'assets/ref1.jpeg',
    'assets/ref1.jpeg.jpg',
    'assets/ref2.jpeg.jpg',
    'assets/ref3.jpeg.jpg',
    'assets/ref4.jpeg.jpg',
  ];

  /* DOM */
  const pill     = document.getElementById('pill');
  const pillTxt  = document.getElementById('pillTxt');
  const toast    = document.getElementById('toast');
  const simVal   = document.getElementById('simVal');
  const stateVal = document.getElementById('stateVal');
  const thrVal   = document.getElementById('thrVal');
  const video    = document.getElementById('video');
  const overlay  = document.getElementById('overlay');
  const ctx      = overlay.getContext('2d', { willReadFrequently: true });
  const startBtn = document.getElementById('startBtn');
  const testBtn  = document.getElementById('testBtn');

  thrVal.textContent = (THRESHOLD * 100).toFixed(0) + '%';

  let refHashes = [];
  let scanning  = false;
  let locked    = false;
  let stream    = null;
  let timer     = null;

  /* ── pHash ─────────────────────────────────────────────── */

  function getPixels(img) {
    const c = document.createElement('canvas');
    c.width = c.height = HASH_SIZE;
    const x = c.getContext('2d', { willReadFrequently: true });
    x.drawImage(img, 0, 0, HASH_SIZE, HASH_SIZE);
    return x.getImageData(0, 0, HASH_SIZE, HASH_SIZE).data;
  }

  function toGrayRow(pixels) {
    const n = HASH_SIZE * HASH_SIZE;
    const g = new Float32Array(n);
    for (let i = 0; i < n; i++) {
      const o = i * 4;
      g[i] = 0.299 * pixels[o] + 0.587 * pixels[o+1] + 0.114 * pixels[o+2];
    }
    return g;
  }

  /* 1-D DCT-II (наивная, достаточно быстрая для 16×16) */
  function dct1d(arr) {
    const N = arr.length;
    const out = new Float32Array(N);
    for (let k = 0; k < N; k++) {
      let s = 0;
      for (let n = 0; n < N; n++) s += arr[n] * Math.cos(Math.PI * k * (2*n+1) / (2*N));
      out[k] = s;
    }
    return out;
  }

  /* 2-D DCT: apply 1-D по строкам, затем по столбцам */
  function dct2d(gray) {
    const N = HASH_SIZE;
    const tmp = new Float32Array(N * N);
    // rows
    for (let r = 0; r < N; r++) {
      const row = gray.slice(r * N, r * N + N);
      const d = dct1d(row);
      for (let c = 0; c < N; c++) tmp[r * N + c] = d[c];
    }
    // cols
    const out = new Float32Array(N * N);
    for (let c = 0; c < N; c++) {
      const col = new Float32Array(N);
      for (let r = 0; r < N; r++) col[r] = tmp[r * N + c];
      const d = dct1d(col);
      for (let r = 0; r < N; r++) out[r * N + c] = d[r];
    }
    return out;
  }

  function computeHash(img) {
    const pixels = getPixels(img);
    const gray   = toGrayRow(pixels);
    const dct    = dct2d(gray);

    // берём левый верхний квадрат 8×8 (кроме [0,0])
    const sub = [];
    for (let r = 0; r < 8; r++)
      for (let c = 0; c < 8; c++)
        if (r || c) sub.push(dct[r * HASH_SIZE + c]);

    const mean = sub.reduce((a, b) => a + b, 0) / sub.length;
    return sub.map(v => v > mean ? 1 : 0);
  }

  function similarity(h1, h2) {
    let same = 0;
    for (let i = 0; i < h1.length; i++) if (h1[i] === h2[i]) same++;
    return same / h1.length;
  }

  /* ── Загрузка референсов ────────────────────────────────── */

  function loadImg(src) {
    return new Promise((res, rej) => {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload  = () => res(img);
      img.onerror = () => rej(new Error('Не загрузить: ' + src));
      img.src = src + '?v=' + Date.now();
    });
  }

  async function loadRefs() {
    setStatus('Загрузка референсов…');
    let ok = 0;
    for (const path of REF_PATHS) {
      try {
        const img  = await loadImg(path);
        const hash = computeHash(img);
        refHashes.push({ path, hash });
        ok++;
      } catch(e) {
        console.warn(e.message);
      }
    }
    if (ok === 0) {
      setStatus('Ошибка: ни один референс не загружен');
      stateVal.textContent = 'Ошибка';
      return false;
    }
    setStatus(`Готово (${ok} из ${REF_PATHS.length} загружено). Нажми «Старт».`, true);
    stateVal.textContent = 'Готово';
    startBtn.disabled = false;
    return true;
  }

  /* ── UI helpers ─────────────────────────────────────────── */

  function setStatus(txt, ok = false) {
    pillTxt.textContent = txt;
    pill.classList.toggle('ok', ok);
  }

  function drawRing(sim) {
    const w = overlay.width, h = overlay.height;
    if (!w || !h) return;
    ctx.clearRect(0, 0, w, h);
    const r   = Math.min(w, h) * 0.35;
    const cx  = w / 2, cy = h / 2;
    const frac = Math.max(0, Math.min(1, sim / THRESHOLD));
    const found = sim >= THRESHOLD;
    ctx.beginPath();
    ctx.arc(cx, cy, r - 6, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * frac);
    ctx.strokeStyle = found ? 'rgba(127,211,155,.98)' : 'rgba(214,255,57,.96)';
    ctx.lineWidth = 5;
    ctx.stroke();
  }

  /* ── Камера ─────────────────────────────────────────────── */

  async function startCamera() {
    if (scanning || locked) return;
    try {
      setStatus('Запрос камеры…');
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: 'environment' } }, audio: false
      });
      video.srcObject = stream;
      await video.play();
      overlay.width  = video.videoWidth  || 720;
      overlay.height = video.videoHeight || 1280;

      scanning = true;
      startBtn.disabled = true;
      startBtn.textContent = 'Сканирование…';
      setStatus('Наведи маркер в круг');
      stateVal.textContent = 'Сканирование';

      timer = setInterval(processFrame, INTERVAL_MS);
    } catch(e) {
      console.error(e);
      setStatus('Нет доступа к камере');
      stateVal.textContent = 'Ошибка';
    }
  }

  function stopCamera() {
    clearInterval(timer);
    stream?.getTracks().forEach(t => t.stop());
    scanning = false;
  }

  /* ── Анализ кадра ───────────────────────────────────────── */

  function processFrame() {
    if (!scanning || locked || !video.videoWidth) return;

    const c = document.createElement('canvas');
    c.width  = video.videoWidth;
    c.height = video.videoHeight;
    c.getContext('2d', { willReadFrequently: true }).drawImage(video, 0, 0);

    let frameHash;
    try { frameHash = computeHash(c); }
    catch(e) { console.error(e); return; }

    let bestSim = 0;
    for (const ref of refHashes) {
      const s = similarity(frameHash, ref.hash);
      if (s > bestSim) bestSim = s;
    }

    simVal.textContent = (bestSim * 100).toFixed(0) + '%';
    drawRing(bestSim);

    if (bestSim >= THRESHOLD) {
      stateVal.textContent = 'Найдено!';
      setStatus('Маркер распознан!', true);
      onDetected();
    } else {
      stateVal.textContent = 'Сканирование';
      setStatus('Схожесть: ' + (bestSim * 100).toFixed(0) + '%');
    }
  }

  function onDetected() {
    locked = true;
    stopCamera();
    toast.classList.add('show');
    setTimeout(() => { window.location.href = TARGET_URL; }, 900);
  }

  /* ── Статический тест ───────────────────────────────────── */

  async function runTest() {
    if (!refHashes.length || locked) return;
    setStatus('Тест…');
    try {
      const img  = await loadImg(refHashes[0].path);
      const hash = computeHash(img);
      const sim  = similarity(hash, refHashes[0].hash);
      simVal.textContent = (sim * 100).toFixed(0) + '%';
      drawRing(sim);
      const ok = sim >= THRESHOLD;
      stateVal.textContent = ok ? 'Тест ОК' : 'Тест провален';
      setStatus(ok ? 'Тест пройден ✓' : 'Тест провален', ok);
    } catch(e) {
      setStatus('Ошибка теста');
    }
  }

  /* ── Init ───────────────────────────────────────────────── */

  startBtn.addEventListener('click', startCamera);
  testBtn.addEventListener('click', runTest);

  loadRefs();
})();
</script>

</body>
</html>
